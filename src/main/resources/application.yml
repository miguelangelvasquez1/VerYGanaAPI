spring:
  application:
    name: VerYGanaAPI

  mvc:
    async:
      request-timeout: 330000  # 5.5 min — mayor que el SseEmitter timeout (5 min)

  profiles:
    active: dev

  config:
    import: optional:file:.env[.properties]

# ============================================
# PQRS - Plazos legales por tipo (días hábiles, Ley 1755 de 2015)
# ============================================
pqrs:
  sla-days:
    PETICION: 15
    QUEJA: 15
    RECLAMO: 15
    SUGERENCIA: 10