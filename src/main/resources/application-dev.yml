spring:
  application:
    name: VerYGanaAPI
  config:
    import: optional:file:.env[.properties]

  # ============================================
  # DATABASE CONFIGURATION
  # ============================================
  datasource:
    # Para Docker usa host.docker.internal
    url: ${DB_URL:jdbc:mysql://localhost:3306/verygana2?useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

  # ============================================
  # JPA/HIBERNATE CONFIGURATION
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

# ============================================
# JWT CONFIGURATION
# ============================================
rsa:
  private-key: classpath:certs/private.pem
  public-key: classpath:certs/public.pem

jwt:
  access-token:
    expiration: 86400      # 1 day (in seconds)
  refresh-token:
    expiration: 604800     # 7 days (in seconds)

# ============================================
# CLOUDFLARE R2 CONFIGURATION
# ============================================
cloudflare:
  r2:
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket-name: ${R2_BUCKET_NAME}
    cdn-domain: ${R2_CDN_DOMAIN}
    games-domain: ${R2_GAMES_DOMAIN:games.verygana.com}
    endpoint: ${R2_ENDPOINT:}
    pets-bucket-name: ${R2_PETS_BUCKET_NAME:verygana-pets}
    pets-cdn-domain: ${R2_PETS_CDN_DOMAIN:}

# Configuración de limpieza de huérfanos
cleanup:
  orphaned-assets:
    enabled: true
    cron: "0 0 2 * * ?" # Cada día a las 2 AM
    max-age-hours: 24 # Eliminar huérfanos de más de 24 horas

# ============================================
# CACHE CONFIGURATION
# ============================================
spring.cache:
  type: caffeine
  caffeine:
    spec: maximumSize=500,expireAfterWrite=24h
  cache-names:
    - availableAdsCount
    - userPreferences
    - categories
    - departments
    - municipalities
    - featureMappings

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-no-corr}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.verygana2: DEBUG
    com.verygana2.repositories: DEBUG
    com.verygana2.services: DEBUG
    com.verygana2.services.storage: DEBUG
    #org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

# ============================================
# EMAIL CONFIGURATION
# ============================================   
sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: notificaciones@verygana.com
  from-name: VerYGana
  support-email: soporte@verygana.com

# ============================================
# GAMES CONFIG
# ============================================ 
games:
  cdn-url: ${GAMES_CDN_URL}
  user-hash-secret: ${USER_HASH_SECRET}
  session-expiration-minutes: 30

# ============================================
# TREASURY DISTRIBUTION
# ============================================
treasury:
  distribution:
    keys-reserve-pct: 60
    fortification-pct: 10
    operations-pct: 30
    keys-reserve-warn-threshold-cents: 10000000 # Umbral WARNING: log de alerta, no bloquea (default $100.000 COP)
    keys-reserve-critical-threshold-cents: 2000000 # Umbral CRÍTICO: bloquea copagos con llaves hasta que se reponga (default $20.000 COP)

financial:
  purchase-keys-percentage: ${PURCHASE_KEYS_PERCENTAGE:75}
  connectivity-keys-percentage: ${CONNECTIVITY_KEYS_PERCENTAGE:25}
  key-value-cents: ${KEY_VALUE_CENTS:1000} # $1.000 centavos de COP por cada key

# ============================================
# MARKETPLACE LIMITS
# ============================================
marketplace:
  min-product-price-cents: 100000      # $1.000 COP
  max-product-price-cents: 50000000    # $500.000 COP

# ============================================
# PURCHASE EXPIRY
# ============================================
purchase:
  expiry:
    max-age-minutes: 120  # 2 horas (sesión Wompi expira antes de esto)
    cron: "0 0/30 * * * *"  # cada 30 minutos

# ============================================
# WOMPI CONFIG
# ============================================ 
# Configuración de Wompi (Produccion)
# wompi:
#   public-key: ${WOMPI_PUBLIC_KEY}
#   private-key: ${WOMPI_PRIVATE_KEY}
#   integrity-secret: ${WOMPI_INTEGRITY_SECRET}
#   events-key: ${WOMPI_EVENTS_KEY}
#   checkout-base-url: https://checkout.wompi.co/p/
#   api-base-url: https://production.wompi.co/v1

wompi:
  public-key: ${WOMPI_SANDBOX_PUBLIC_KEY}
  private-key: ${WOMPI_SANDBOX_PRIVATE_KEY}
  integrity-secret: ${WOMPI_SANDBOX_INTEGRITY_SECRET}
  events-key: ${WOMPI_SANDBOX_EVENTS_KEY}
  checkout-base-url: https://checkout.wompi.co/p/
  api-base-url: https://sandbox.wompi.co/v1
  
payment:
  min-deposit: 5000      # $5.000 COP
  max-deposit: 10000000  # $10.000.000 COP


# ============================================
# SECURITY MONITORING CONFIG
# ============================================
app:
  security:
    monitoring:
      enabled: true
      auto-block-enabled: false
      check-interval-ms: 3600000       # Detección sospechosa: cada 1 hora
      session-check-interval-ms: 1800000 # Sesiones anómalas: cada 30 min
      health-check-interval-ms: 300000   # Health check: cada 5 min
    cleanup:
      cron: "0 0 2 * * ?"              # Limpieza de tokens: 2:00 AM diario
    suspicious-activity:
      tokens-per-ip-threshold: 10       # Tokens por IP que activan alerta
      check-window-hours: 1             # Ventana de tiempo para detección
    sessions:
      max-per-user: 15                  # Máx. sesiones activas por usuario

# ============================================
# AUDIT CONFIG
# ============================================
audit:
  # Habilitar/deshabilitar auditoría
  enabled: true
  
  # Nivel mínimo para persistir (útil en dev)
  # DEBUG: solo para debugging local
  # INFO: operaciones normales
  # WARNING: operaciones sospechosas
  # CRITICAL: operaciones críticas
  min-level: INFO
  
  # Configuración de retención (días)
  retention:
    debug: 7
    info: 90
    warning: 365
    critical: 2555  # 7 años
  
  # Limpieza automática
  cleanup:
    enabled: true
    cron: "0 0 3 * * ?"  # 3 AM diario
    
  # Reportes
  reports:
    weekly:
      enabled: true
      cron: "0 0 8 * * MON"  # Lunes 8 AM
      recipients:
        - admin@verygana.com
        
  # Máscaras por defecto (además de las especificadas en @Auditable)
  default-mask-params:
    - password
    - confirmPassword
    - oldPassword
    - token
    - apiKey
    - secret
    - creditCard
    - ssn
    
  # Excluir de auditoría (no auditar aunque tenga @Auditable)
  excluded-actions:
    - HEALTH_CHECK
    - METRICS_COLLECTION
    
  # Configuración de async
  async:
    core-pool-size: 2
    max-pool-size: 10
    queue-capacity: 500
    thread-name-prefix: "audit-"

# ============================================
# Sorteos con API externa (Random.org)
# ============================================
randomOrg:
  api-url: https://api.random.org/json-rpc/4/invoke
  api-key: ${RANDOM_ORG_API_KEY:your-random-org-api-key}
  timeout: 30000 # 30 segundos