<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; background: #f4f4f4; }
.container { max-width: 600px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.header { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 40px 20px; text-align: center; }
.header h1 { font-size: 26px; margin-bottom: 8px; }
.header p { font-size: 15px; opacity: 0.9; }
.content { padding: 32px; text-align: center; }
.content p { font-size: 15px; color: #555; margin-bottom: 16px; }
.order-badge { display: inline-block; background: #f0f4ff; border: 2px solid #667eea; border-radius: 8px; padding: 12px 24px; font-size: 20px; font-weight: bold; color: #667eea; margin: 16px 0; }
.footer { background: #f9f9f9; padding: 20px; text-align: center; border-top: 1px solid #e0e0e0; font-size: 13px; color: #666; }
.footer a { color: #667eea; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>¡Nueva Venta!</h1>
    <p>Tienes una nueva venta en tu tienda</p>
  </div>
  <div class="content">
    <p>Se registró una nueva orden con tus productos.</p>
    <div class="order-badge">Orden #{{orderId}}</div>
    <p>Entra a la plataforma para ver los detalles.</p>
  </div>
  <div class="footer">
    <p>¿Necesitas ayuda? <a href="mailto:{{supportEmail}}">{{supportEmail}}</a></p>
    <p style="margin-top:10px;font-size:11px;color:#999;">© 2025 VeryGana. Todos los derechos reservados.</p>
  </div>
</div>
</body>
</html>
