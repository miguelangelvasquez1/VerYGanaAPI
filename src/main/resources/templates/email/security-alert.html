<h1>Alerta de seguridad crítica</h1>
<p class="subtitle">Se detectó actividad sospechosa que requiere revisión</p>
<div class="reason-box">
  <h3>{{alertType}} — {{severity}}</h3>
  <p>{{description}}</p>
</div>
<div class="order-info">
  <p><strong>Origen:</strong> {{source}}</p>
  <p><strong>Detectado:</strong> {{detectedAt}}</p>
</div>
<div class="btn-wrapper">
  <a href="{{platformUrl}}" class="btn">Ver eventos de seguridad</a>
</div>
